name: tubeflow_app
description: TubeFlow - Video Note-Taking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Authentication
  clerk_flutter: ^0.0.14-beta
  clerk_auth: ^0.0.14-beta

  # Convex backend
  convex_flutter: ^3.0.1

  # Routing
  go_router: ^17.1.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # YouTube player
  youtube_player_flutter: ^9.1.0

  # UI components
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.0

  # Storage
  shared_preferences: ^2.3.0

  # Utilities
  intl: ^0.20.2
  http: ^1.6.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
