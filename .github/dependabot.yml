version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/replayglowz_site"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "replayglowz_site"
    groups:
      npm-patch-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "pip"
    directory: "/replayglowz_lab"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "replayglowz_lab"
    groups:
      pip-patch-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "pub"
    directory: "/replayglowz_app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "replayglowz_app"
    groups:
      pub-patch-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-patch-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "docker"
    directory: "/replayglowz_lab"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "replayglowz_lab"
      - "docker"
    groups:
      docker-patch-minor:
        update-types:
          - "patch"
          - "minor"
